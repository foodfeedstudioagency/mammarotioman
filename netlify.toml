# Serve actual files first (logo, CSS, images)
[[redirects]]
  from = "/logo.png"
  to = "/logo.png"
  status = 200

[[redirects]]
  from = "/*.png"
  to = "/:splat.png"
  status = 200

[[redirects]]
  from = "/*.jpg"
  to = "/:splat.jpg"
  status = 200

[[redirects]]
  from = "/*.css"
  to = "/:splat.css"
  status = 200

# Then redirect everything else to construction page
[[redirects]]
  from = "/*"
  to = "/construction.html"
  status = 200
  force = true